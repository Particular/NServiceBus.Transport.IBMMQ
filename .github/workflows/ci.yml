name: CI
on:
  push:
    branches:
      - main
      - release-*
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      run_perf_tests:
        description: Run performance tests
        type: boolean
        default: false
env:
  DOTNET_NOLOGO: true
  IBMMQ_CONNECTIONSTRING: ${{ secrets.IBMMQ_CONNECTIONSTRING }}
defaults:
  run:
    shell: pwsh
jobs:
  build:
    name: Linux
    runs-on: ubuntu-latest
    services:
      ibm-mq:
        image: icr.io/ibm-messaging/mq:latest
        ports:
          - 1414:1414
          - 9443:9443
        env:
          LICENSE: accept
          MQ_QMGR_NAME: QM1
          MQ_ADMIN_PASSWORD: ${{ secrets.MQ_ADMIN_PASSWORD }}
          MQ_APP_PASSWORD: ${{ secrets.MQ_APP_PASSWORD }}
        options: >-
          --health-cmd "dspmq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.1.0
        with:
          dotnet-version: 10.0.x
      - name: Setup least-privilege test user
        shell: bash
        run: |
          CONTAINER=$(docker ps -q --filter "ancestor=icr.io/ibm-messaging/mq:latest" | head -1)
          .github/workflows/setup-leastpriv-tests.sh docker "$CONTAINER"
      - name: Build
        run: dotnet build src/NServiceBus.Transport.IBMMQ.slnx --configuration Release
      - name: Upload packages
        uses: actions/upload-artifact@v6.0.0
        with:
          name: NuGet packages
          path: nugets/
          retention-days: 7
      - name: Run tests
        run: dotnet test src/NServiceBus.Transport.IBMMQ.slnx --configuration Release --no-build --logger "GitHubActions;report-warnings=false"


