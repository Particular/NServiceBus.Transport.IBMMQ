name: CI
on:
  push:
    branches:
      - main
      - release-*
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:
    inputs:
      run_perf_tests:
        description: Run performance tests
        type: boolean
        default: false
env:
  DOTNET_NOLOGO: true
defaults:
  run:
    shell: pwsh
jobs:
  build:
    name: Linux
    runs-on: ubuntu-latest
    services:
      ibm-mq:
        image: icr.io/ibm-messaging/mq:latest
        ports:
          - 1414:1414
          - 9443:9443
        env:
          LICENSE: accept
          MQ_QMGR_NAME: QM1
          MQ_ADMIN_PASSWORD: ${{ secrets.MQ_ADMIN_PASSWORD }}
          MQ_APP_PASSWORD: testpass1
        options: >-
          --health-cmd "dspmq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.1.0
        with:
          dotnet-version: 10.0.x
      - name: Setup least-privilege test user
        shell: bash
        run: |
          CONTAINER=$(docker ps -q --filter "ancestor=icr.io/ibm-messaging/mq:latest" | head -1)
          extra/setup-leastpriv-tests.sh docker "$CONTAINER"
      - name: Build
        run: dotnet build src/NServiceBus.Transport.IbmMq.slnx --configuration Release
      - name: Run tests
        run: dotnet test src/NServiceBus.Transport.IbmMq.slnx --configuration Release --no-build --logger "GitHubActions;report-warnings=false"

  perf-test-gate:
    name: Perf test gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check for perf-test label
        shell: bash
        env:
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'perf-test') }}
        run: |
          if [ "$HAS_LABEL" != "true" ]; then
            echo "::error::The 'perf-test' label is required. Add it to the PR to run performance tests."
            exit 1
          fi

  perf-tests:
    name: Performance tests
    if: >-
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'perf-test'))
      || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_perf_tests == 'true')
      || (github.event_name == 'push')
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: perf-tests-${{ github.ref_name }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    services:
      ibm-mq:
        image: icr.io/ibm-messaging/mq:latest
        ports:
          - 1414:1414
          - 9443:9443
        env:
          LICENSE: accept
          MQ_QMGR_NAME: QM1
          MQ_ADMIN_PASSWORD: ${{ secrets.MQ_ADMIN_PASSWORD }}
        options: >-
          --health-cmd "dspmq"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 30s
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5.1.0
        with:
          dotnet-version: 10.0.x
      - name: Check for perf tag
        id: perf-tag
        shell: bash
        run: |
          TAG=$(git tag --points-at HEAD | grep -E '^perf(/|$)' | head -1 || true)
          if [ -z "$TAG" ]; then
            echo "No perf tag found, will run all scenarios with defaults"
            exit 0
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Parse: perf[/<scenario>[/<transaction-mode>[/<instance-counts>]]]
          IFS='/' read -ra PARTS <<< "$TAG"
          # PARTS[0]=perf, PARTS[1]=scenario, PARTS[2]=tx-mode, PARTS[3]=instance-counts

          SCENARIO="${PARTS[1]:-}"
          TX_MODE="${PARTS[2]:-}"
          INSTANCES="${PARTS[3]:-}"

          if [ -n "$SCENARIO" ] && [ "$SCENARIO" != "all" ]; then
            echo "scenario=$SCENARIO" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$TX_MODE" ] && [ "$TX_MODE" != "all" ]; then
            echo "transaction-mode=$TX_MODE" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$INSTANCES" ] && [ "$INSTANCES" != "all" ]; then
            # Convert dash-separated to space-separated: 1-2-4 -> 1 2 4
            echo "instance-counts=${INSTANCES//-/ }" >> "$GITHUB_OUTPUT"
          fi
      - name: Run performance tests
        id: run-perf
        shell: bash
        run: |
          ARGS=(--output perf-results.json)
          if [ -n "$SCENARIO" ]; then
            ARGS+=(--scenarios "$SCENARIO")
          fi
          if [ -n "$TX_MODE" ]; then
            ARGS+=(--transaction-modes "$TX_MODE")
          fi
          if [ -n "$INSTANCE_COUNTS" ]; then
            # shellcheck disable=SC2086
            ARGS+=(--instance-counts $INSTANCE_COUNTS)
          fi
          echo "Running: dotnet run --project src/PerformanceTests --configuration Release -- ${ARGS[*]}"
          START=$SECONDS
          dotnet run --project src/PerformanceTests --configuration Release -- "${ARGS[@]}"
          ELAPSED=$(( SECONDS - START ))
          MINS=$(( ELAPSED / 60 ))
          SECS=$(( ELAPSED % 60 ))
          echo "duration=${MINS}m ${SECS}s" >> "$GITHUB_OUTPUT"
        env:
          IBMMQ_CONNECTIONSTRING: mq://admin:${{ secrets.MQ_ADMIN_PASSWORD }}@localhost:1414
          SCENARIO: ${{ steps.perf-tag.outputs.scenario }}
          TX_MODE: ${{ steps.perf-tag.outputs.transaction-mode }}
          INSTANCE_COUNTS: ${{ steps.perf-tag.outputs.instance-counts }}
      - name: Upload performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: perf-results.json
          if-no-files-found: ignore
      - name: Checkout benchmark-data branch
        if: success()
        uses: actions/checkout@v6.0.2
        with:
          ref: benchmark-data
          path: _benchmark-data
      - name: Publish results to benchmark-data
        if: success()
        shell: bash
        run: extra/publish-benchmark.sh perf-results.json "${{ github.head_ref || github.ref_name }}" "${{ github.sha }}"
      - name: Compare with baseline
        if: success() && github.event_name == 'pull_request'
        id: compare
        shell: bash
        env:
          PERF_DURATION: ${{ steps.run-perf.outputs.duration }}
        run: |
          SAFE_BRANCH=$(echo "${{ github.head_ref }}" | tr '/' '-')
          EXIT_CODE=0
          extra/compare-benchmarks.sh \
            _benchmark-data/main/latest.json \
            "_benchmark-data/branches/${SAFE_BRANCH}/latest.json" \
            > comparison.md || EXIT_CODE=$?
          cat comparison.md
          if [ "$EXIT_CODE" -ne 0 ]; then
            echo "regression=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Post comparison to PR
        if: success() && github.event_name == 'pull_request' && hashFiles('comparison.md') != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT_BODY=$(cat comparison.md)
          # Try to update an existing comment first, create new if none exists
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "$COMMENT_BODY" \
            --edit-last 2>/dev/null \
          || gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "$COMMENT_BODY"
      - name: Fail on regression
        if: steps.compare.outputs.regression == 'true'
        shell: bash
        run: |
          echo "::error::Performance regression detected. See the PR comment for details."
          exit 1
      - name: Delete perf tag
        if: always() && steps.perf-tag.outputs.tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.perf-tag.outputs.tag }}"
          echo "Deleting perf tag '$TAG' from remote"
          git push origin --delete "refs/tags/$TAG" || echo "Tag already deleted or not on remote"
